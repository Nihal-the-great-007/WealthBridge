<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthBridge  Retirement Planner</title>
  <meta name="description"
    content="High-fidelity interactive retirement corpus projection dashboard with Monte Carlo stochastic simulation  WealthBridge." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    /* 
       DESIGN TOKENS  Cyber-Financial Dark Mode
     */
    :root {
      --bg: #0D0D11;
      --panel: #16161F;
      --panel-border: rgba(0, 180, 219, 0.18);
      --panel-hover: rgba(0, 180, 219, 0.06);
      --purple: #00b4db; /* Aqua blue primary */
      --purple-dim: rgba(0, 180, 219, 0.15);
      --purple-glow: rgba(0, 180, 219, 0.35);
      --magenta: #E01E37;
      --magenta-dim: rgba(224, 30, 55, 0.15);
      --magenta-glow: rgba(224, 30, 55, 0.40);
      --cyan: #4FC3F7;
      --green: #4CAF50;
      --gold: #FFD700;
      --amber: #FF9800;
      --text-primary: #F0F0F5;
      --text-secondary: #A0A0B0;
      --text-muted: #606070;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'JetBrains Mono', monospace;
      --topbar-bg: rgba(13, 13, 17, 0.92);
      --input-bg: rgba(0, 0, 0, 0.3);
      --income-row-bg: rgba(0, 0, 0, 0.25);
      --table-thead-bg: rgba(22, 22, 31, 0.98);
    }

    /*  Reset & Base  */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /*  Scrollbar  */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--panel);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--purple);
      border-radius: 3px;
    }

    /* 
       TOPBAR / NAV
     */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--topbar-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--panel-border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--purple), var(--magenta));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 18px var(--purple-glow);
    }

    .brand-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.4px;
      background: linear-gradient(90deg, var(--text-primary) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      font-size: 10.5px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      background: var(--purple-dim);
      border: 1px solid var(--purple);
      border-radius: 20px;
      color: var(--purple);
      letter-spacing: 0.4px;
    }

    .badge.magenta {
      background: var(--magenta-dim);
      border-color: var(--magenta);
      color: var(--magenta);
    }

    /*  Loading Overlay  */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.4s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 3px solid var(--panel);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /*  Calc spinner (inline)  */
    .calc-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .calculating .calc-spinner {
      display: block;
    }

    /* 
       TAB NAVIGATION
     */
    .tabs-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 16px 28px 0;
      border-bottom: 1px solid var(--panel-border);
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: all var(--transition);
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: var(--panel-hover);
    }

    .tab-btn.active {
      color: var(--purple);
      border-bottom-color: var(--purple);
      background: var(--panel-hover);
    }

    .tab-icon {
      font-size: 16px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* 
       LAYOUT: MAIN CONTENT AREA
     */
    .main-content {
      padding: 24px 28px;
    }

    /*  Panel / Card  */
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 22px;
      transition: border-color var(--transition);
    }
